<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver One - Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
background:#FFD600;
color:#000;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:#1f1f1f;
border-radius:15px;
padding:20px;
margin-bottom:15px;
}

.valor{
font-size:32px;
color:#00ff66;
font-weight:bold;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.botao{
background:#FFD600;
color:#000;
padding:15px;
text-align:center;
border-radius:10px;
font-weight:bold;
text-decoration:none;
}
</style>

</head>

<body>

<header>
🚖 Driver One
</header>

<div class="container">

<div class="card">
<h2>Faturamento Hoje</h2>
<div class="valor">R$ 0,00</div>
</div>

<div class="card">
<h2>Lucro Líquido</h2>
<div class="valor">R$ 0,00</div>
</div>

<div class="card">
<h2>Quilômetros Rodados</h2>
<div class="valor">0 km</div>
</div>

<div class="menu">

<a class="botao">Corridas</a>

<a class="botao">Ganhos</a>

<a class="botao">Despesas</a>

<a class="botao">Abastecimento</a>

<a class="botao">Relatórios</a>

<a class="botao">Configurações</a>

</div>

</div>

</body>
</html>
