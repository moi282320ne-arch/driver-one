<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abastecimento</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>⛽ Abastecimento</header>

<div class="card">

<label>Data</label>
<input type="date">

<br><br>

<label>Posto</label>
<input type="text" placeholder="Nome do posto">

<br><br>

<label>Litros</label>
<input type="number" placeholder="Ex: 35">

<br><br>

<label>Valor por litro</label>
<input type="number" step="0.01" placeholder="Ex: 5.89">

<br><br>

<label>Quilometragem</label>
<input type="number" placeholder="Ex: 125430">

<br><br>

<button class="botao">
Salvar Abastecimento
</button>

</div>

</body>
</html>
