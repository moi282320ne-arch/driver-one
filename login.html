<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver One - Login</title>
<style>
body{
margin:0;
font-family:Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}
.box{
width:90%;
max-width:350px;
background:#222;
padding:25px;
border-radius:15px;
}
h1{
color:#FFD600;
text-align:center;
}
input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:none;
}
button{
width:100%;
padding:15px;
background:#FFD600;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
<h1>Driver One</h1>

<input type="email" placeholder="E-mail">

<input type="password" placeholder="Senha">

<button>Entrar</button>

</div>

</body>
</html>
