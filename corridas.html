<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registrar Corrida</title>

<link rel="stylesheet" href="css/style.css">
<script src="js/app.js"></script>

</head>

<body>

<header>🚖 Registrar Corrida</header>

<div class="card">

<label>Aplicativo</label>

<select id="app">
<option>Uber</option>
<option>99</option>
<option>Mcar</option>
<option>Maxim</option>
<option>InDrive</option>
<option>Particular</option>
<option>iFood Carro</option>
</select>

<br><br>

<label>Valor (R$)</label>

<input
id="valor"
type="number"
placeholder="Ex: 25.50">

<br><br>

<label>Quilômetros</label>

<input
id="km"
type="number"
placeholder="Ex: 12">

<br><br>

<button
class="botao"
onclick="salvarCorrida()">
Salvar Corrida
</button>

</div>

<script>

function salvarCorrida(){

const valor=document.getElementById("valor").value;

const km=document.getElementById("km").value;

registrarCorrida(valor,km);

alert("Corrida salva com sucesso!");

window.location="dashboard.html";

}

</script>

</body>
</html>
