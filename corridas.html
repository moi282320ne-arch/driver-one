<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadastro de Corridas</title>

<link rel="stylesheet" href="css/style.css">

<style>
.container{
padding:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:15px;
background:#FFD600;
border:none;
font-size:18px;
font-weight:bold;
border-radius:10px;
}
</style>

</head>

<body>

<header>Cadastro de Corridas</header>

<div class="container">

<input type="date">

<select>
<option>Uber</option>
<option>99</option>
<option>InDrive</option>
<option>Maxim</option>
<option>Mcar</option>
<option>Particular</option>
</select>

<input type="number" placeholder="Valor da corrida">

<input type="number" placeholder="Quilômetros">

<button>Salvar Corrida</button>

</div>

</body>
</html>
